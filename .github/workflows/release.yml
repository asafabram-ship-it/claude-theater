name: Release

# Publishes to PyPI when a version tag is pushed, e.g.  git tag v0.1.0 && git push --tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Verify the git tag matches __version__
        shell: bash
        run: |
          VER=$(python -c "import re,io;print(re.search(r'__version__ = \"([^\"]+)\"', io.open('claude_theater.py',encoding='utf-8').read()).group(1))")
          TAG="${GITHUB_REF_NAME#v}"
          echo "tag=$TAG  package __version__=$VER"
          test "$TAG" = "$VER" || { echo "::error::tag $GITHUB_REF_NAME does not match __version__ $VER"; exit 1; }
      - name: Build sdist + wheel
        run: pipx run build
      - name: Check metadata
        run: pipx run twine check dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Trusted Publishing (OIDC) — no API token stored. Configure a matching
    # publisher in the PyPI project settings, and add a protection rule
    # (required reviewer / tag filter) to the 'pypi' environment so a publish
    # needs human approval and cannot fire from an arbitrary tag push.
    environment:
      name: pypi
      url: https://pypi.org/p/claude-theater
    permissions:
      id-token: write       # mint the OIDC token PyPI trusts
      attestations: write   # PEP 740 signed provenance for the artifacts
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
